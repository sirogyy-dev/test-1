name: todo_app
description: A professional To-Do List app built with Flutter, Firebase, and Riverpod.
publish_to: none
version: 0.1.0
environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: '>=3.7.0'
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.5
  flutter_riverpod: ^2.4.0
  firebase_core: ^2.17.0
  firebase_auth: ^4.7.0
  cloud_firestore: ^4.9.0
  google_sign_in: ^6.1.0
  intl: ^0.18.1
  flutter_local_notifications: ^14.0.0
  flutter_native_timezone: ^3.1.0
  timezone: ^0.10.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test: ^1.0.0
  mocktail: ^0.5.0
  test: ^1.27.0
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
